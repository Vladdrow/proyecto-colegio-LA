services:
  server:
    build:
      context: .
      dockerfile: dockerfiles/nginx.dockerfile
    ports:
      - 8081:80
    volumes:
      - ./src:/var/www/html:cached
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - postgres
    container_name: api_server
    networks:
      - api_network
    environment:
      - CORS_ALLOWED_ORIGINS=http://localhost:4200

  php:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src:/var/www/html:cached
    container_name: api_php
    networks:
      - api_network
    environment:
      - PHP_FPM_CHILDREN=10
    

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    tty: true
    container_name: api_postgres
    env_file:
      - postgresql/.env
    ports:
      - 5433:5432
    networks:
      - api_network
    volumes:
      - ./postgresql_data:/var/lib/postgresql
    command: postgres -c log_hostname=off -c log_connections=off

  adminer:
    image: adminer:latest
    restart: always
    container_name: api_adminer
    depends_on:
      - postgres
      - mysql
    ports:
      - 8091:8080
    networks:
      - api_network

  composer:
    build:
      context: .
      dockerfile: dockerfiles/composer.dockerfile
    volumes:
      - ./src:/var/www/html:cached
    depends_on:
      - php
    networks:
      - api_network

  artisan:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src:/var/www/html:cached
    entrypoint: ["php", "/var/www/html/artisan"]
    networks:
      - api_network

  angular:
    image: node:20-alpine
    container_name: api_angular
    working_dir: /app
    volumes:
      - ./angular-front:/app
    ports:
      - "4200:4200"
    networks:
      - api_network
    command: sh -c "npm install && npx -y @angular/cli@latest serve --host 0.0.0.0 --port 4200 --poll=2000"
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true

networks:
  api_network:
    driver: bridge
